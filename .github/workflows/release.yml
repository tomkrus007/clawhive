name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: clawhive

jobs:
  build-packages:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: cd web && bun install && bun run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        env:
          # sqlite-vec.c uses BSD u_int*_t types not available in musl
          CFLAGS: ${{ contains(matrix.target, 'musl') && '-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t' || '' }}
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p clawhive-cli
          else
            cargo build --release --locked --target ${{ matrix.target }} -p clawhive-cli
          fi

      - name: Package archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/${{ env.BINARY_NAME }}
          chmod +x dist/${{ env.BINARY_NAME }}
          cp -r skills dist/skills
          tar -C dist -czf ${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${BINARY_NAME} skills
          if command -v shasum &>/dev/null; then
            shasum -a 256 ${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > ${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.sha256
          else
            sha256sum ${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > ${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.sha256
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.sha256

  publish-release:
    name: Publish GitHub Release
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
